<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="capGrad_The Classic" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="30%" stop-color="#1e1e1e"/>
      <stop offset="70%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="#0a0a0a"/>
  
  <!-- Crown -->
  <ellipse cx="250" cy="200" rx="160" ry="120" fill="url(#capGrad_The Classic)"/>
  <rect x="90" y="200" width="320" height="80" fill="url(#capGrad_The Classic)"/>
  
  <!-- Brim -->
  <ellipse cx="250" cy="290" rx="190" ry="45" fill="#050505"/>
  <ellipse cx="250" cy="285" rx="185" ry="40" fill="#1e1e1e"/>
  
  <!-- Panel seams -->
  <line x1="250" y1="80" x2="250" y2="280" stroke="#050505" stroke-width="1" opacity="0.4"/>
  <line x1="170" y1="95" x2="170" y2="280" stroke="#050505" stroke-width="0.5" opacity="0.3"/>
  <line x1="330" y1="95" x2="330" y2="280" stroke="#050505" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Button -->
  <circle cx="250" cy="82" r="5" fill="#282828"/>
  
  <!-- Logo on front panel -->
  <text x="250" y="195" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="18" letter-spacing="6" fill="#e8e4df" opacity="0.85">SEYMOUR</text>
  <text x="250" y="215" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="12" letter-spacing="5" fill="#e8e4df" opacity="0.75">MAISON</text>
  <text x="250" y="228" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="7" letter-spacing="2" fill="#b8960c" opacity="0.6" font-style="italic">Est. 1993</text>
  
  <!-- Product label -->
  <text x="250" y="480" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" 
        font-size="11" letter-spacing="3" fill="#666">THE CLASSIC</text>
</svg>