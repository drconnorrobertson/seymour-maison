<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="500" height="650">
  <defs>
    <linearGradient id="bodyGrad_The Statement" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="15%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#292929"/>
      <stop offset="85%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>
    <linearGradient id="sleeveL_The Statement" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="sleeveR_The Statement" x1="1" y1="0" x2="0" y2="0.3">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="650" fill="#0a0a0a"/>
  
  <!-- Left Sleeve -->
  <path d="M 80 165 L 30 185 L 30 290 L 100 290 L 100 165 Z" 
        fill="url(#sleeveL_The Statement)" />
  
  <!-- Right Sleeve -->
  <path d="M 420 165 L 470 185 L 470 290 L 400 290 L 400 165 Z" 
        fill="url(#sleeveR_The Statement)" />
  
  <!-- Body -->
  <path d="M 100 155 L 100 580 L 400 580 L 400 155 
           L 310 140 Q 290 120 250 115 Q 210 120 190 140 L 100 155 Z" 
        fill="url(#bodyGrad_The Statement)" />
  
  <!-- Collar -->
  <path d="M 190 140 Q 210 120 250 115 Q 290 120 310 140" 
        fill="none" stroke="#060606" stroke-width="3" />
  <path d="M 192 142 Q 212 124 250 119 Q 288 124 308 142" 
        fill="none" stroke="#101010" stroke-width="1.5" />
  
  <!-- Subtle fold lines -->
  <line x1="250" y1="200" x2="250" y2="560" stroke="#101010" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="350" x2="300" y2="345" stroke="#101010" stroke-width="0.3" opacity="0.2"/>
  
  <!-- Side seams -->
  <line x1="100" y1="290" x2="100" y2="580" stroke="#060606" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="290" x2="400" y2="580" stroke="#060606" stroke-width="1" opacity="0.5"/>
  
  <!-- SEYMOUR MAISON Logo on chest -->
  <text x="250" y="265" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="22" letter-spacing="8" fill="#e8e4df" opacity="0.8">SEYMOUR</text>
  <text x="250" y="288" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="15" letter-spacing="6" fill="#e8e4df" opacity="0.7">MAISON</text>
  <text x="250" y="304" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" 
        font-size="8" letter-spacing="3" fill="#b8960c" opacity="0.6" font-style="italic">Est. 1993</text>
  
  <!-- Product label -->
  <text x="250" y="630" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" 
        font-size="11" letter-spacing="3" fill="#666" text-transform="uppercase">THE STATEMENT</text>
</svg>